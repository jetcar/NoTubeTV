name: Release Preparation

on:
  push:
    branches:
      - main
      - master
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - closed

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
