name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - feature
      - enhancement
  - title: 'Fixes'
    labels:
      - bug
      - bugfix
      - fix
  - title: 'Performance'
    labels:
      - performance
      - perf
  - title: 'Documentation'
    labels:
      - documentation
      - docs
  - title: 'Maintenance'
    labels:
      - chore
      - dependencies
      - refactor

exclude-labels:
  - skip-release-notes

change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
change-title-escapes: '<*_&'

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - bug
      - bugfix
      - fix
      - chore
      - dependencies
  default: patch

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
